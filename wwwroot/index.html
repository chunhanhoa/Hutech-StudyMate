<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Phân tích điểm HUTECH</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="css/site.css" />
    <style>
      /* ===== Layout mới ===== */
      :root {
        --gap:1.1rem;
        --panel-bg:#ffffff;
        --panel-border:#e2e5ea;
        --panel-radius:14px;
        --shadow:0 4px 10px -2px rgba(0,0,0,.06),0 2px 4px -1px rgba(0,0,0,.04);
        --accent:#0d62ff;
        --accent-hover:#0a51d6;
        --soft:#f4f7fb;
        --soft-border:#d7dde5;
        --danger:#d93939;
        --ok:#14884f;
        --warn:#e59f18;
        --font: 'Segoe UI', system-ui, Roboto, Arial, sans-serif;
      }
      body {font-family:var(--font);background:#f2f5f9;margin:0;color:#1d2430;}
      .container {max-width:1480px;padding:1.2rem 1.4rem;margin:0 auto;}
      .grid-app {
        display:grid;
        grid-template-columns:320px 1fr;
        gap:var(--gap);
        align-items:flex-start;
      }
      @media (max-width:1100px){
        .grid-app {grid-template-columns:1fr;}
      }
      .left-stack {display:flex;flex-direction:column;gap:var(--gap);}
      .main-stack {display:flex;flex-direction:column;gap:var(--gap);}
      .panel {
        background:var(--panel-bg);
        border:1px solid var(--panel-border);
        border-radius:var(--panel-radius);
        padding:1.05rem 1.15rem 1.2rem;
        box-shadow:var(--shadow);
        position:relative;
      }
      .panel h2, .panel h3 {margin:.15rem 0 .85rem;font-weight:600;}
      header.app-header {
        background:linear-gradient(120deg,#0d62ff,#6636ff);
        color:#fff;
        padding:1.05rem 1.4rem;
        box-shadow:0 4px 18px -4px rgba(0,0,0,.25);
      }
      header.app-header h1 {margin:0;font-size:1.35rem;font-weight:600;letter-spacing:.3px;}
      /* Upload form */
      form#uploadForm .field {margin-bottom:.9rem;display:flex;flex-direction:column;gap:.45rem;}
      form#uploadForm label {font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;font-weight:600;color:#4d5b6c;}
      form#uploadForm input, form#uploadForm select {
        padding:.58rem .7rem;
        border:1px solid var(--soft-border);
        border-radius:8px;
        background:#fff;
        font-size:.9rem;
        outline:none;
        transition: border-color .15s, box-shadow .15s;
      }
      form#uploadForm input:focus, form#uploadForm select:focus {
        border-color:var(--accent);
        box-shadow:0 0 0 2px rgba(13,98,255,.15);
      }
      .drop-zone {
        display:flex;align-items:center;justify-content:center;
        padding:1rem .75rem;
        border:2px dashed #b9c3d1;
        border-radius:10px;
        background:var(--soft);
        cursor:pointer;
        font-size:.85rem;
        color:#4d5b6c;
        transition:background .15s,border-color .15s;
        min-height:74px;
        text-align:center;
      }
      .drop-zone.dragging {background:#e2edff;border-color:var(--accent);color:#1d2430;}
      .actions {display:flex;gap:.6rem;margin-top:.4rem;}
      button {
        border:none;
        background:var(--accent);
        color:#fff;
        padding:.65rem 1.05rem;
        font-size:.85rem;
        font-weight:600;
        border-radius:8px;
        cursor:pointer;
        letter-spacing:.3px;
        display:inline-flex;
        gap:.4rem;
        align-items:center;
        transition: background .18s, transform .15s;
      }
      button:hover {background:var(--accent-hover);}
      button:active {transform:translateY(1px);}
      button.secondary {
        background:var(--soft);
        color:#2b3745;
        border:1px solid var(--soft-border);
      }
      button.secondary:hover {background:#e9eef3;}
      #status.status {margin-top:.6rem;font-size:.78rem;font-weight:600;}
      #status.ok {color:var(--ok);}
      #status.error {color:var(--danger);}
      #status.loading {color:var(--warn);}
      /* AI Panel */
      #aiSection .ai-output {font-size:.8rem;line-height:1.45;max-height:160px;overflow:auto;}
      .chat-messages {
        background:#f8fafc;
        border:1px solid var(--soft-border);
        padding:.6rem .55rem;
        border-radius:10px;
        display:flex;
        flex-direction:column;
        gap:.45rem;
        max-height:340px;
        overflow:auto;
        scroll-behavior:smooth;
      }
      .msg {font-size:.78rem;line-height:1.35;padding:.55rem .7rem;border-radius:14px;max-width:92%;box-shadow:0 2px 4px -1px rgba(0,0,0,.08);}
      .msg.user {margin-left:auto;background:#0564ff;color:#fff;}
      .msg.assistant {background:#eceff3;color:#1d2430;}
      .chat-input-row {display:flex;gap:.5rem;margin-top:.35rem;}
      .chat-input-row input {
        flex:1;
        border:1px solid var(--soft-border);
        background:#fff;
        padding:.5rem .65rem;
        border-radius:8px;
        font-size:.8rem;
      }
      .chat-input-row input:focus {border-color:var(--accent);}
      /* Kết quả */
      #summary.summary-grid {
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
        gap:.65rem;
        margin-bottom:1.1rem;
      }
      #summary .item {
        background:#f8fafc;
        border:1px solid var(--soft-border);
        border-radius:10px;
        padding:.55rem .6rem .65rem;
        display:flex;
        flex-direction:column;
        gap:.35rem;
      }
      #summary .item .k {
        font-size:.65rem;
        font-weight:600;
        letter-spacing:.8px;
        color:#5a6775;
        text-transform:uppercase;
      }
      #summary .item .v {font-size:.9rem;font-weight:600;color:#1d2430;}
      #gradesWrapper {position:relative;}
      #gradesWrapper h3 {margin:.3rem 0 .75rem;font-size:1rem;}
      #gradesTable {
        border-collapse:separate;
        border-spacing:0;
        width:100%;
        font-size:.8rem;
        background:#fff;
        border:1px solid var(--soft-border);
        border-radius:12px;
        overflow:hidden;
      }
      #gradesTable thead th {
        position:sticky;
        top:0;
        background:#f1f5f9;
        backdrop-filter:blur(3px);
        font-weight:600;
        font-size:.7rem;
        letter-spacing:.6px;
        color:#475366;
        padding:.55rem .5rem .5rem;
        border-bottom:1px solid var(--soft-border);
        z-index:2;
        text-transform:uppercase;
      }
      #gradesTable tbody td {
        padding:.45rem .55rem;
        border-bottom:1px solid #eef2f6;
        background:#fff;
      }
      #gradesTable tbody tr:last-child td {border-bottom:none;}
      #gradesTable tbody tr:nth-child(even) td {background:#fafbfc;}
      #gradesTable tbody tr:hover td {background:#ebf3ff;}
      #gradesTable td.num {text-align:right;font-variant-numeric:tabular-nums;}
      /* Màu phân loại */
      tr.in td {border-left:4px solid var(--ok);}
      tr.out td {border-left:4px solid var(--danger);background:#fff7f7;}
      tr.nonacc td {border-left:4px solid #a46bff;background:#f7f2ff;}
      /* Scroll wrapper nếu cần */
      #gradesWrapper table {display:block;overflow:auto;max-height:560px;}
      /* Phân trang */
      .pagination {
        display:flex;
        gap:.4rem;
        flex-wrap:wrap;
        margin-top:.9rem;
        user-select:none;
      }
      .pagination button {
        background:#fff;
        border:1px solid var(--soft-border);
        padding:.4rem .65rem;
        font-size:.65rem;
        letter-spacing:.5px;
        font-weight:600;
        border-radius:7px;
        cursor:pointer;
        min-width:38px;
        transition:background .15s,border-color .15s;
      }
      .pagination button:hover {background:#eef4ff;border-color:var(--accent);}
      .pagination button.active {background:var(--accent);color:#fff;border-color:var(--accent);}
      .pagination button:disabled {opacity:.45;cursor:not-allowed;}
      /* Footer */
      .footer {
        margin-top:2.2rem;
        padding:1.4rem 1.2rem 2.2rem;
        text-align:center;
        font-size:.7rem;
        color:#5d6775;
      }
      /* Hidden utility */
      .hidden {display:none !important;}
      @media (max-width:640px){
        #gradesWrapper table {max-height:400px;}
        #summary .item {padding:.5rem .55rem;}
      }
    </style>
  </head>
  <body class="light">
    <header class="app-header">
      <h1>Phân tích điểm sinh viên</h1>
    </header>

    <main class="container">
      <div class="grid-app">
        <div class="left-stack">
          <!-- Upload Panel -->
          <section class="panel">
            <h2>Tải lên</h2>
            <form id="uploadForm" novalidate>
              <div class="field">
                <label for="mssv">MSSV</label>
                <input id="mssv" name="mssv" required />
              </div>

              <div class="field">
                <label for="yearSelect">Niên khóa</label>
                <select id="yearSelect" required>
                  <option value="">-- Chọn niên khóa --</option>
                </select>
              </div>
              <div class="field">
                <label for="deptSelect">Khoa / Viện</label>
                <select id="deptSelect" required disabled>
                  <option value="">-- Chọn khoa / viện --</option>
                </select>
              </div>

              <div class="field">
                <label>File Excel (.xlsx) – Bảng điểm</label>
                <div id="dropZone" class="drop-zone">
                  <!-- Ẩn input để tránh click mở dialog 2 lần -->
                  <input type="file" id="file" name="file" accept=".xlsx" style="display:none" />
                  <span id="dropZoneText">Chọn hoặc kéo thả file vào đây</span>
                </div>
              </div>
              <div class="actions">
                <button type="submit" id="btnUpload"
                  data-busy-text="Đang xử lý...">Phân tích</button>
                <button type="reset" class="secondary">Xóa</button>
              </div>
            </form>
            <div id="status" class="status"></div>
          </section>
          <!-- AI Panel -->
          <section id="aiSection" class="panel ai-panel hidden">
            <h3>Tư vấn AI</h3>
              <div class="ai-actions">
                <button id="btnGetAdvice">Gợi ý tổng quan</button>
              </div>
              <div id="adviceOutput" class="ai-output"></div>
              <div class="chat-box">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-row">
                  <input id="chatInput" placeholder="Hỏi AI..." />
                  <button id="btnSendChat">Gửi</button>
                </div>
              </div>
          </section>
        </div>
        <div class="main-stack">
          <!-- Panel kết quả -->
          <section class="panel results-panel">
            <h2>Kết quả</h2>
            <div id="summary" class="summary-grid hidden"></div>
            <div id="gradesWrapper" class="hidden wide">
              <h3>Môn đã nhận dạng</h3>
              <table id="gradesTable">
                <thead>
                  <tr>
                    <th>STT</th><th>Mã</th><th>Tên môn</th><th>TC</th><th>TK(10)</th><th>TK(CH)</th><th>TK(4)</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
              <div id="pagination" class="pagination"></div>
            </div>
            <details id="rawJsonBlock" class="hidden">
              <summary>JSON phản hồi</summary>
              <pre id="rawJson"></pre>
            </details>
          </section>
        </div>
      </div>
    </main>

    <footer class="footer">
      <small>Demo • Sẽ bổ sung gợi ý học phần & AI.</small>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
