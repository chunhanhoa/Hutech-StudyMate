<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Phân tích điểm HUTECH</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="css/site.css" />
  </head>
  <body class="light">
    <header class="app-header">
      <h1>Phân tích điểm sinh viên</h1>
    </header>

    <main class="container">
      <section class="panel">
        <h2>Tải lên</h2>
        <form id="uploadForm" novalidate>
          <div class="field">
            <label for="mssv">MSSV</label>
            <input id="mssv" name="mssv" required />
          </div>

          <div class="field">
            <label for="yearSelect">Niên khóa</label>
            <select id="yearSelect" required>
              <option value="">-- Chọn niên khóa --</option>
            </select>
          </div>
          <div class="field">
            <label for="deptSelect">Khoa / Viện</label>
            <select id="deptSelect" required disabled>
              <option value="">-- Chọn khoa / viện --</option>
            </select>
          </div>

          <div class="field">
            <label>File Excel (.xlsx) – Bảng điểm</label>
            <div id="dropZone" class="drop-zone">
              <!-- Ẩn input để tránh click mở dialog 2 lần -->
              <input type="file" id="file" name="file" accept=".xlsx" style="display:none" />
              <span id="dropZoneText">Chọn hoặc kéo thả file vào đây</span>
            </div>
          </div>
          <div class="actions">
            <button type="submit" id="btnUpload"
              data-busy-text="Đang xử lý...">Phân tích</button>
            <button type="reset" class="secondary">Xóa</button>
          </div>
        </form>
        <div id="status" class="status"></div>
      </section>

      <section class="panel">
        <h2>Kết quả</h2>
        <div id="summary" class="summary-grid hidden"></div>
        <div id="gradesWrapper" class="hidden wide">
          <h3>Môn đã nhận dạng</h3>
          <table id="gradesTable">
            <thead>
              <tr>
                <th>STT</th><th>Mã</th><th>Tên môn</th><th>TC</th><th>TK(10)</th><th>TK(CH)</th><th>TK(4)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <details id="rawJsonBlock" class="hidden">
          <summary>JSON phản hồi</summary>
          <pre id="rawJson"></pre>
        </details>
      </section>
    </main>

    <footer class="footer">
      <small>Demo • Sẽ bổ sung gợi ý học phần & AI.</small>
    </footer>
    <!-- Thêm các script (dùng relative path để phù hợp GitHub Pages) -->
    <script src="js/app.js"></script>
  </body>
</html>
